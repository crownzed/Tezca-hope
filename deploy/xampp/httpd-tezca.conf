# Tezca — VirtualHost Apache (XAMPP)
#
# File gốc nằm trong DỰ ÁN: deploy/xampp/httpd-tezca.conf
# (Không có sẵn trong C:\xampp — copy bằng tay hoặc: npm run xampp:install-apache)
# Xem thêm: deploy/xampp/VI_TRI_FILE.txt
#
# Cách dùng (Windows XAMPP):
# 1) Mở C:\xampp\apache\conf\httpd.conf — bật các dòng (bỏ #):
#    LoadModule proxy_module modules/mod_proxy.so
#    LoadModule proxy_http_module modules/mod_proxy_http.so
#    LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
#    Include conf/extra/httpd-vhosts.conf
#
# 2) Copy nội dung khối <VirtualHost> bên dưới vào
#    C:\xampp\apache\conf\extra\httpd-vhosts.conf
#    (hoặc lưu file này vào conf/extra/ và thêm: Include conf/extra/httpd-tezca.conf)
#
# 3) Sửa DocumentRoot cho đúng thư mục chứa bản build (sau npm run build / npm run xampp:build).
#
# 4) Chạy API Node trên 127.0.0.1:3001 (vd: cd server && npm run dev  hoặc  npm start)
#
# 5) Khởi động lại Apache trong XAMPP Control Panel.
#
# Truy cập: http://tezca.local/  (thêm dòng 127.0.0.1 tezca.local vào C:\Windows\System32\drivers\etc\hosts)
#     hoặc đổi ServerName thành localhost nếu chỉ dùng http://localhost/

<VirtualHost *:80>
    ServerName tezca.local
    DocumentRoot "C:/xampp/htdocs/tezca"

    <Directory "C:/xampp/htdocs/tezca">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        # SPA (React Router): mọi đường dẫn không phải file → index.html
        FallbackResource /index.html
    </Directory>

    # API + WebSocket → Express (phải chạy song song)
    ProxyPreserveHost On
    ProxyPass        /api http://127.0.0.1:3001/api
    ProxyPassReverse /api http://127.0.0.1:3001/api

    ProxyPass        /ws  ws://127.0.0.1:3001/ws
    ProxyPassReverse /ws  ws://127.0.0.1:3001/ws

    ErrorLog "logs/tezca-error.log"
    CustomLog "logs/tezca-access.log" common
</VirtualHost>
