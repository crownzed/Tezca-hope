# Gắn Tezca vào VirtualHost website có sẵn (Apache)
# 1) Sửa đường dẫn DocumentRoot / Alias cho đúng thư mục chứa bản build (dist).
# 2) API Node chạy nội bộ: cd server && NODE_ENV=production JWT_SECRET=... npm start  (cổng 3001)
# 3) Dán khối dưới vào VirtualHost hiện tại (hoặc Include file này).

# --- Tezca: frontend tại /tezca/ (đổi alias nếu dùng tên khác) ---
Alias /tezca "C:/xampp/htdocs/tezca"
<Directory "C:/xampp/htdocs/tezca">
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
    FallbackResource /tezca/index.html
</Directory>

# --- API + WebSocket (cùng domain — tránh CORS) ---
ProxyPreserveHost On
ProxyPass        /api http://127.0.0.1:3001/api
ProxyPassReverse /api http://127.0.0.1:3001/api
ProxyPass        /ws  ws://127.0.0.1:3001/ws
ProxyPassReverse /ws  ws://127.0.0.1:3001/ws
